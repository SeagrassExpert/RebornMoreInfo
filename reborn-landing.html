<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBORN - Seagrass Restoration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #81c784 0%, #2d5a3d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 12px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        a {
            display: block;
            padding: 16px 20px;
            margin-bottom: 8px;
            background-color: #2d6a4f;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.3s ease;
            font-size: 14px;
            word-wrap: break-word;
        }
        
        a:hover {
            background-color: #1b4332;
        }
        
        .link-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 More information</h1>
        <p class="subtitle">Meet us online!</p>
        
        <div class="links-section">
            <div>
                <div class="link-label">Main project website</div>
                <a href="https://reborn.nweurope.eu/" target="_blank">REBORN Project Summary</a>
            </div>
            
            <div>
                <div class="link-label">A new dawn for transnational seagrass Collaboration</div>
                <a href="https://www.decadeonrestoration.org/reborn-new-dawn-transnational-seagrass-collaboration-north-west-europe" target="_blank">Learn More</a>
            </div>
            
            <div>
                <div class="link-label">Connect with us</div>
                <a href="https://www.linkedin.com/company/reborn-interreg-nwe/posts/?feedView=all" target="_blank">LinkedIn</a>
            </div>
        </div>
        
        <div class="footer">
            Transnational seagrass restoration for sustainable coastal ecosystems
        </div>
    </div>
</body>
</html>
